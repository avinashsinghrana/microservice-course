spring.application.name=api-gateway

server.port=8084

#Eureka Client Configuration
# It's important to set the prefer-ip-address to true, otherwise eureka will register the service with its hostname which might not be resolvable in some environments.
# This is especially important in containerized environments like Docker or Kubernetes where the hostname might not be easily resolvable.
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone= http://localhost:8761/eureka/


# Spring Cloud Gateway Configuration
# Notice the ".mvc." in the property keys
# Route 1: Rating Service
spring.cloud.gateway.server.webmvc.routes[0].id=RATING-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://RATING-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/rating-service/**

# Route 2: Hotel Service
spring.cloud.gateway.server.webmvc.routes[1].id=HOTEL-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://HOTEL-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/hotel-service/**

# Route 3: User Service
spring.cloud.gateway.server.webmvc.routes[2].id=USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/user-service/**

spring.config.import=configserver:http://localhost:8085
