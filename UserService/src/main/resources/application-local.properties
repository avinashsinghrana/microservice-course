spring.cloud.config.enabled=false

spring.datasource.url=jdbc:mysql://localhost:3306/microservice
spring.datasource.username=root
spring.datasource.password=credable
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Eureka Client Configuration
# It's important to set the prefer-ip-address to true, otherwise eureka will register the service with its hostname which might not be resolvable in some environments.
# This is especially important in containerized environments like Docker or Kubernetes where the hostname might not be easily resolvable.

# This will make the service register itself with Eureka using its IP address instead of hostname
# This is useful in environments where hostname resolution may not work correctly, such as in Docker containers or Kubernetes pods.
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone= http://localhost:8761/eureka/

# circuit breaker configuration
resilience4j.circuitbreaker.instances.rating-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.rating-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.rating-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.rating-service.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.rating-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.rating-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.rating-service.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.rating-service.recordExceptions=java.lang.Exception
resilience4j.circuitbreaker.instances.rating-service.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.rating-service.eventConsumerBufferSize=10


management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health
management.endpoint.health.show-components=always
