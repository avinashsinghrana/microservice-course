spring.application.name=hotel-service
server.servlet.context-path=/hotel-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/microservice
spring.datasource.username=postgres
spring.datasource.password=credable
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#Eureka Client Configuration
# It's important to set the prefer-ip-address to true, otherwise eureka will register the service with its hostname which might not be resolvable in some environments.
# This is especially important in containerized environments like Docker or Kubernetes where the hostname might not be easily resolvable.
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.serviceUrl.defaultZone= http://localhost:8761/eureka/

spring.config.import= configserver:http://localhost:8085

# circuit breaker configuration
resilience4j.circuitbreaker.instances.hotel-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.hotel-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.hotel-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.hotel-service.waitDurationInOpenState=5000
resilience4j.circuitbreaker.instances.hotel-service.permittedNumberOfCallsInHalfOpenState=5
resilience4j.circuitbreaker.instances.hotel-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.hotel-service.slowCallRateThreshold=50
resilience4j.circuitbreaker.instances.hotel-service.slowCallDurationThreshold=2000
resilience4j.circuitbreaker.instances.hotel-service.recordExceptions=java.lang.Exception
resilience4j.circuitbreaker.instances.hotel-service.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.hotel-service.automaticTransitionFromOpenToHalfOpenEnabled=true

management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,circuitbreakers
management.endpoint.health.show-components=always


